<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | Code 3 Leads</title>

<link rel="stylesheet" href="css/styles.css">

<style>
.form-container {
  max-width: 500px;
  margin: 40px auto;
  background: #1f2937;
  padding: 25px;
  border-radius: 10px;
}

.form-container h2 {
  text-align: center;
  margin-bottom: 20px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 6px;
  border: none;
  background: #020617;
  color: white;
}

textarea {
  resize: none;
  height: 120px;
}

.checkbox {
  margin-top: 15px;
  font-size: 14px;
  line-height: 1.4;
}

button {
  width: 100%;
  margin-top: 20px;
  padding: 12px;
  background: #e11d48;
  border: none;
  border-radius: 8px;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #be123c;
}
</style>
</head>

<body style="margin:0; font-family:Arial; background:#020617; color:white;">

<header style="padding:20px; text-align:center;">
  <img src="images/code3-logo.png" style="width:240px;">
  <p style="margin-top:10px; color:#e11d48; font-weight:bold;">
    🇺🇸 Veteran Owned & Operated
  </p>
</header>

<section class="form-container">

<h2>Request Service</h2>

<form>

<label>Name</label>
<input type="text" placeholder="Your Name" required>

<label>Email</label>
<input type="email" placeholder="Your Email Address" required>

<label>Phone Number (Optional)</label>
<input type="tel" placeholder="Your Phone Number">

<p style="font-size:13px; color:#9ca3af; margin-top:6px;">
Providing a phone number allows us to contact you regarding your request.
</p>

<label>How can we help?</label>
<textarea placeholder="Describe your issue or request..." required></textarea>

<div class="checkbox">

  <label style="display:flex; align-items:flex-start; gap:10px; cursor:pointer;">
    <input type="checkbox" style="width:auto; margin-top:4px;">

    <span>
      I agree to receive SMS messages from Code 3 Leads regarding service updates, appointment scheduling, and customer support. Message frequency varies. Message & data rates may apply. Reply STOP to opt out and HELP for help.
    </span>
  </label>

<br>

<a href="privacy-policy.html" target="_blank">Privacy Policy</a>
&nbsp;|&nbsp;
<a href="terms.html" target="_blank">Terms of Service</a>

</div>

<button type="submit">Submit Request</button>

<p id="confirmation" style="display:none; color:lime; margin-top:10px;">
Request submitted successfully.
</p>

</form>

</section>

<script>
document.querySelector("form").addEventListener("submit", async function(e) {

    e.preventDefault();

    const inputs = document.querySelectorAll("input");
    const textarea = document.querySelector("textarea");

    const data = {
        name: inputs[0].value,
        email: inputs[1].value,
        phone: inputs[2].value,
        service: "Main Website Contact Form",
        message: textarea.value
    };

    try {

        await fetch(
            "https://show-runner-backend.onrender.com/lead",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            }
        );

        document.getElementById("confirmation").style.display = "block";
        document.querySelector("button").innerText = "Submitted";

    }
    catch(error){

        console.error(error);

        document.getElementById("confirmation").innerText =
        "Submission failed. Please try again.";

        document.getElementById("confirmation").style.display = "block";
    }

});
</script>

</body>
</html>
